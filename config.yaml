# Content Engine Configuration

storage:
  # Where raw downloads and processed clips are stored
  raw_dir: "data/raw"
  clips_dir: "data/clips"
  rendered_dir: "data/rendered"
  transcripts_dir: "data/transcripts"

database:
  url: "sqlite:///data/content_engine.db"

whisper:
  # Model size: tiny, base, small, medium, large
  model: "base"
  # Device: cpu, cuda, or directml
  # - cpu: works everywhere (slower for transcription)
  # - cuda: for NVIDIA GPUs or AMD ROCm (ROCm uses "cuda" — do NOT set "rocm")
  # - directml: for AMD/Intel GPUs on Windows/WSL2 (pip install torch-directml)
  device: "directml"
  # Language (null = auto-detect)
  language: null

downloader:
  # Max concurrent downloads
  max_concurrent: 3
  # Preferred video format
  format: "bestvideo[height<=1080]+bestaudio/best[height<=1080]"
  # Rate limit (bytes/sec, null = unlimited)
  rate_limit: null

clipper:
  # Default clip duration range (seconds)
  min_duration: 30
  max_duration: 90
  # Padding added before/after detected segments (seconds)
  padding: 2

editor:
  # Reframe landscape clips to 9:16 portrait (with face tracking)
  reframe: true
  # Burn word-by-word captions from Whisper timestamps
  captions: true
  # Caption styling
  caption_font: "Arial"
  caption_font_size: 20
  caption_color: "&H00FFFFFF"           # white (ASS BGR)
  caption_highlight_color: "&H0000FFFF" # yellow highlight on active word
  caption_words_per_group: 4
  caption_uppercase: true
  # Watermark/logo (leave empty to skip)
  watermark_path: ""
  watermark_position: "top-right"       # top-left, top-right, bottom-left, bottom-right
  watermark_opacity: 0.7

platforms:
  youtube:
    enabled: true
    # credentials stored in credentials store, not here
  tiktok:
    enabled: true
  instagram:
    enabled: true
